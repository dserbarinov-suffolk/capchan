[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "framechan"
version = "0.1.0"
description = "Shared Capchan kernel for video samples, stationarity segments, and recognized text."
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "Pillow",
    "pytesseract",
]

[tool.setuptools.packages.find]
where = ["src"]
